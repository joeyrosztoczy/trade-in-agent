services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trade_in_agent
      POSTGRES_PASSWORD: trade_in_agent
      POSTGRES_DB: trade_in_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - trade_in_agent_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_in_agent -d trade_in_agent_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trade_in_agent_pg:
